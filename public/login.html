<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINNIE BOT - Нэвтрэх</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="VINNIE BOT" class="logo">
                <h1>VINNIE BOT</h1>
                <p>Discord эдийн засгийн бот - Вэб тоглоом</p>
            </div>
            
            <div class="login-body">
                <a href="/auth/discord" class="discord-btn">
                    <i class="fab fa-discord"></i>
                    Discord-оор нэвтрэх
                </a>
                
                <div class="features">
                    <div class="feature">
                        <i class="fas fa-dice"></i>
                        <span>Тоглоом</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-store"></i>
                        <span>Дэлгүүр</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-trophy"></i>
                        <span>Лидерборд</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-chart-line"></i>
                        <span>Coin график</span>
                    </div>
                </div>
            </div>
            
            <div class="login-footer">
                <p>Дискорд боттой холбогдож, өөрийн мөнгө, зоос, эрдэсүүдээ удирдана уу.</p>
            </div>
        </div>
    </div>
</body>
</html>
