<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINNIE BOT - Лидерборд</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/leaderboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="VINNIE BOT">
                <h2>VINNIE BOT</h2>
            </div>
            
            <div class="user-info" id="userInfo">
                <div class="user-avatar">
                    <img id="userAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar" style="width: 40px; height: 40px; border-radius: 50%;">
                </div>
                <div class="user-details">
                    <span class="user-name" id="userName">Зочны хэрэглэгч</span>
                    <span class="user-id" id="userId"></span>
                </div>
                <div class="user-menu">
                    <button class="user-menu-btn" id="userMenuBtn">
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="/profile"><i class="fas fa-user"></i> Профайл</a>  <!-- Edit Account-ийг Profile-р сольсон -->
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Гарах</a>
                    </div>
                </div>
            </div>
            
            <div class="balance-cards">
                <div class="balance-card">
                    <i class="fas fa-money-bill-wave"></i>
                    <div>
                        <span class="balance-label">Мөнгө</span>
                        <span class="balance-amount" id="money">0</span>
                    </div>
                </div>
                <div class="balance-card">
                    <i class="fas fa-piggy-bank"></i>
                    <div>
                        <span class="balance-label">Банк</span>
                        <span class="balance-amount" id="bank">0</span>
                    </div>
                </div>
                <div class="balance-card">
                    <i class="fas fa-coins"></i>
                    <div>
                        <span class="balance-label">Зоос</span>
                        <span class="balance-amount" id="coin">0</span>
                    </div>
                </div>
            </div>
            
            <div class="coin-price">
                <i class="fas fa-chart-line"></i>
                <span>1 COIN = </span>
                <span id="coinPrice">3000</span>
                <span>💰</span>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/">
                        <i class="fas fa-home"></i>
                        <span>Нүүр</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/game">
                        <i class="fas fa-dice"></i>
                        <span>Тоглоом</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/shop">
                        <i class="fas fa-store"></i>
                        <span>Дэлгүүр</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/inventory">
                        <i class="fas fa-box"></i>
                        <span>Агуулах</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/coinchart">
                        <i class="fas fa-chart-line"></i>
                        <span>Coin график</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="/leaderboard">
                        <i class="fas fa-trophy"></i>
                        <span>Лидерборд</span>
                    </a>
                </li>
            </ul>
            
            <div class="auth-section" id="authSection">
                <input type="text" id="userIdInput" placeholder="Discord ID-ээ оруулна уу" class="user-id-input">
                <button id="loginBtn" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Нэвтрэх
                </button>
            </div>
        </nav>
        
        <!-- Main Content -->
        <main class="main-content">
            <h1>🏆 ЛИДЕРБОРД</h1>
            
            <div class="leaderboard-tabs">
                <button class="lb-tab active" data-type="money">💰 Мөнгө</button>
                <button class="lb-tab" data-type="bank">🏦 Банк</button>
                <button class="lb-tab" data-type="coin">🪙 Зоос</button>
                <button class="lb-tab" data-type="diamond">💎 Алмааз</button>
            </div>
            
            <div class="leaderboard-container">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Хэрэглэгч</th>
                            <th>Дүн</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <tr>
                            <td colspan="3" class="loading">Ачааллаж байна...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="user-rank" id="userRank">
                <!-- Хэрэглэгчийн байрлал JavaScript-ээр дүүргэгдэнэ -->
            </div>
        </main>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/leaderboard.js"></script>
</body>
</html>
