<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINNIE BOT - Edit Account</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/edit-account.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation (index.html-той ижил) -->
        <nav class="sidebar">
            <div class="logo">
                <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="VINNIE BOT">
                <h2>VINNIE BOT</h2>
            </div>
            
            <!-- index.html - user-info хэсгийг доорх крор солино -->
            <div class="user-info" id="userInfo">
                <div class="user-avatar">
                    <img id="userAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar" style="width: 40px; height: 40px; border-radius: 50%;">
                </div>
                <div class="user-details">
                    <span class="user-name" id="userName">Зочны хэрэглэгч</span>
                    <span class="user-id" id="userId"></span>
                </div>
                <div class="user-menu">
                    <button class="user-menu-btn" id="userMenuBtn">
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="/profile"><i class="fas fa-user"></i> Профайл</a>  <!-- Edit Account-ийг Profile-р сольсон -->
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Гарах</a>
                    </div>
                </div>
            </div>
            
            <div class="balance-cards">
                <div class="balance-card">
                    <i class="fas fa-money-bill-wave"></i>
                    <div>
                        <span class="balance-label">Мөнгө</span>
                        <span class="balance-amount" id="money">0</span>
                    </div>
                </div>
                <div class="balance-card">
                    <i class="fas fa-piggy-bank"></i>
                    <div>
                        <span class="balance-label">Банк</span>
                        <span class="balance-amount" id="bank">0</span>
                    </div>
                </div>
                <div class="balance-card">
                    <i class="fas fa-coins"></i>
                    <div>
                        <span class="balance-label">Зоос</span>
                        <span class="balance-amount" id="coin">0</span>
                    </div>
                </div>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/">
                        <i class="fas fa-home"></i>
                        <span>Нүүр</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/game">
                        <i class="fas fa-dice"></i>
                        <span>Тоглоом</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/shop">
                        <i class="fas fa-store"></i>
                        <span>Дэлгүүр</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/inventory">
                        <i class="fas fa-box"></i>
                        <span>Агуулах</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/leaderboard">
                        <i class="fas fa-trophy"></i>
                        <span>Лидерборд</span>
                    </a>
                </li>
            </ul>
        </nav>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="edit-account-container">
                <h1><i class="fas fa-cog"></i> Edit Account</h1>
                
                <div class="account-card">
                    <div class="account-header">
                        <img id="profileAvatar" src="" alt="Profile" class="profile-avatar">
                        <h2 id="profileUsername">Хэрэглэгч</h2>
                        <p id="profileEmail">email@example.com</p>
                    </div>
                    
                    <div class="account-body">
                        <div class="info-row">
                            <span class="info-label">Discord ID:</span>
                            <span class="info-value" id="profileId"></span>
                        </div>
                        
                        <div class="info-row">
                            <span class="info-label">Discord Username:</span>
                            <span class="info-value" id="profileTag"></span>
                        </div>
                        
                        <div class="info-row">
                            <span class="info-label">Бүртгүүлсэн:</span>
                            <span class="info-value">2024-01-01</span>
                        </div>
                    </div>
                    
                    <div class="account-actions">
                        <button class="btn btn-primary" id="refreshDataBtn">
                            <i class="fas fa-sync-alt"></i> Өгөгдөл шинэчлэх
                        </button>
                        
                        <button class="btn btn-danger" id="logoutBtn2">
                            <i class="fas fa-sign-out-alt"></i> Гарах
                        </button>
                    </div>
                    
                    <div class="account-footer">
                        <p>Таны бүх мэдээлэл Discord-ээс автоматаар татагдана.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/edit-account.js"></script>
    <script src="/js/server-check.js"></script>
</body>
</html>
